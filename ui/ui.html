<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: Inter, -apple-system, sans-serif;
  font-size: 12px;
  background: #111;
  color: #e0e0e0;
  height: 100vh;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

/* ── COLLAPSED STATE ── */
body.collapsed .body,
body.collapsed .bottom,
body.collapsed .dev-banner { display: none !important; }
body.collapsed .topbar { border-bottom: none; padding: 8px 12px; }
body.collapsed { height: auto; }
.collapse-btn {
  width: 26px; height: 26px; border: 1px solid #222; border-radius: 6px;
  background: transparent; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  color: #555; transition: all 0.12s; font-size: 10px;
}
.collapse-btn:hover { background: #1a1a1a; color: #aaa; }
.status-strip {
  display: none;
  align-items: center;
  gap: 6px;
  padding: 0 2px;
  font-size: 11px;
  color: #666;
  flex: 1;
  overflow: hidden;
}
body.collapsed .status-strip { display: flex; }
body.collapsed .logo { display: none; }
.status-frame {
  color: #aaa; font-weight: 500;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  max-width: 160px;
}
.status-sep { color: #333; flex-shrink: 0; }
.status-hint { color: #444; flex-shrink: 0; }

/* ── DEV BANNER ── */
.dev-banner {
  display: flex; align-items: center; justify-content: space-between;
  padding: 5px 12px; background: #1a1400; border-bottom: 1px solid #3d3000;
  flex-shrink: 0; font-size: 10px; color: #d4a800;
}
.dev-dot { width: 5px; height: 5px; border-radius: 50%; background: #d4a800;
  margin-right: 5px; display: inline-block; animation: devpulse 2s infinite; }
@keyframes devpulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
.dev-off-btn {
  font-size: 10px; padding: 2px 8px; border: 1px solid #3d3000;
  border-radius: 10px; background: transparent; color: #d4a800;
  cursor: pointer; font-family: inherit; transition: all 0.12s;
}
.dev-off-btn:hover { background: #2a2000; border-color: #d4a800; }

/* ── TOPBAR ── */
.topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 10px 14px; border-bottom: 1px solid #1e1e1e; flex-shrink: 0;
}
.logo { display: flex; align-items: center; gap: 7px; }
.logo-mark { width: 22px; height: 22px; background: #fff; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.logo-mark svg { width: 13px; height: 13px; }
.logo-name { font-size: 13px; font-weight: 500; color: #fff; letter-spacing: -0.2px; }
.logo-badge { font-size: 10px; color: #666; background: #1a1a1a; border: 1px solid #2a2a2a; padding: 1px 6px; border-radius: 20px; }
.topbar-right { display: flex; align-items: center; gap: 5px; }
.icon-btn { width: 26px; height: 26px; border: 1px solid #222; border-radius: 6px; background: transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; color: #555; transition: all 0.12s; }
.icon-btn:hover { background: #1a1a1a; color: #aaa; }
.config-dot { width: 6px; height: 6px; border-radius: 50%; background: #1D9E75; display: none; }
.mem-dot { width: 6px; height: 6px; border-radius: 50%; background: #5e8ef8; display: none; }

/* ── BODY ── */
.body { display: flex; flex: 1; min-height: 0; }

/* ── SIDEBAR ── */
.sidebar { width: 152px; flex-shrink: 0; border-right: 1px solid #1a1a1a; display: flex; flex-direction: column; background: #0d0d0d; }
.frame-card { margin: 10px 10px 0; background: #181818; border: 1px solid #222; border-radius: 8px; padding: 8px; cursor: pointer; transition: border-color 0.12s; }
.frame-card:hover { border-color: #333; }
.frame-card.empty { opacity: 0.4; pointer-events: none; }
.frame-thumb { width: 100%; height: 58px; background: #111; border: 1px solid #1e1e1e; border-radius: 5px; overflow: hidden; margin-bottom: 7px; position: relative; }
.thumb-mock { position: absolute; inset: 0; background: linear-gradient(160deg,#1a1a2e 0%,#162032 100%); }
.thumb-mock::before { content:''; position: absolute; top: 8px; left: 8px; right: 8px; height: 8px; background: rgba(255,255,255,0.07); border-radius: 2px; }
.thumb-mock::after { content:''; position: absolute; top: 22px; left: 8px; right: 20px; height: 5px; background: rgba(255,255,255,0.04); border-radius: 2px; }
.thumb-empty { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.thumb-empty svg { opacity: 0.2; }
.frame-name { font-size: 11px; font-weight: 500; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.frame-sub { font-size: 10px; color: #555; margin-top: 1px; }
.sidebar-section { padding: 10px 10px 4px; }
.sidebar-label { font-size: 10px; font-weight: 500; color: #444; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 2px 5px; }
.action-item { display: flex; align-items: center; gap: 7px; padding: 6px 8px; border-radius: 6px; cursor: pointer; font-size: 11px; color: #666; transition: all 0.1s; border: 1px solid transparent; margin-bottom: 1px; }
.action-item:hover { background: #181818; color: #ddd; border-color: #222; }
.action-item.active { background: #fff; color: #111; }
.ai-icon { font-size: 12px; width: 16px; text-align: center; flex-shrink: 0; }
.ai-label { flex: 1; }
.ai-badge { font-size: 9px; padding: 1px 4px; border-radius: 8px; background: #2a2a2a; color: #555; }
.action-item.active .ai-badge { background: rgba(0,0,0,0.12); color: #444; }

/* ── MAIN ── */
.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }
.chat { flex: 1; overflow-y: auto; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; min-height: 0; }
.chat::-webkit-scrollbar { width: 3px; }
.chat::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

.msg { display: flex; gap: 7px; align-items: flex-start; }
.msg.user { flex-direction: row-reverse; }
.msg-av { width: 20px; height: 20px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; font-weight: 600; margin-top: 1px; }
.msg-av.ai { background: #fff; color: #111; }
.msg-av.user { background: #1e1e1e; border: 1px solid #2a2a2a; color: #666; }
.bubble { max-width: 100%; padding: 8px 11px; border-radius: 10px; font-size: 12px; line-height: 1.6; }
.msg.ai .bubble { background: #181818; border: 1px solid #222; color: #ccc; border-top-left-radius: 3px; }
.msg.user .bubble { background: #fff; color: #111; border-top-right-radius: 3px; }
.bubble b { color: #fff; font-weight: 600; }
.msg.user .bubble b { color: #111; }
.bubble i { color: #888; font-style: italic; }
.bubble code { background: #1e1e1e; padding: 1px 5px; border-radius: 3px; font-family: monospace; font-size: 11px; color: #aaa; }
.bubble h3 { font-size: 11px; font-weight: 600; color: #fff; margin: 5px 0 2px; }
.bubble ul { padding-left: 14px; margin: 3px 0; }
.bubble ul li { margin: 2px 0; }
.bubble.streaming::after { content: '▋'; display: inline-block; animation: cur 0.8s infinite; color: #555; font-size: 10px; }
@keyframes cur { 0%,100%{opacity:1} 50%{opacity:0} }

.typing-dots { display: flex; gap: 3px; align-items: center; padding: 3px 0; }
.typing-dots span { width: 4px; height: 4px; border-radius: 50%; background: #444; animation: blink 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes blink { 0%,80%,100%{opacity:0.2} 40%{opacity:1} }

.audit-card { background: #0d0d0d; border: 1px solid #1e1e1e; border-radius: 8px; padding: 10px 11px; margin-top: 6px; }
.audit-title { font-size: 11px; color: #666; margin-bottom: 8px; }
.metrics { display: flex; gap: 5px; margin-bottom: 8px; }
.metric { flex: 1; background: #151515; border-radius: 6px; padding: 6px 8px; text-align: center; }
.metric-val { font-size: 16px; font-weight: 500; color: #fff; line-height: 1; }
.metric-lbl { font-size: 10px; color: #555; margin-top: 2px; }
.metric.warn .metric-val { color: #c97c2e; }
.metric.ok .metric-val { color: #2d9e6b; }
.tags { display: flex; gap: 4px; flex-wrap: wrap; }
.tag { font-size: 10px; padding: 2px 7px; border-radius: 20px; border: 1px solid #222; color: #555; }
.progress-bar { height: 2px; background: #1e1e1e; border-radius: 2px; overflow: hidden; margin-top: 8px; }
.progress-fill { height: 100%; background: #fff; border-radius: 2px; transition: width 0.4s ease; }

.choice-btns { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 7px; }
.choice-btn { font-size: 11px; padding: 4px 10px; border: 1px solid #2a2a2a; border-radius: 20px; background: #181818; color: #888; cursor: pointer; transition: all 0.1s; white-space: nowrap; }
.choice-btn:hover { background: #222; color: #ddd; border-color: #444; }
.use-frame-btn { width: 100%; margin-top: 5px; background: transparent; border: 1px dashed #2a2a2a; border-radius: 7px; padding: 6px; color: #555; font-size: 11px; cursor: pointer; transition: all 0.12s; font-family: inherit; }
.use-frame-btn:hover { border-color: #444; color: #aaa; }

.empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; text-align: center; padding: 20px; }
.empty-icon { width: 36px; height: 36px; background: #181818; border: 1px solid #222; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 16px; margin-bottom: 2px; }
.empty-title { font-size: 12px; font-weight: 500; color: #555; }
.empty-sub { font-size: 11px; color: #333; line-height: 1.5; max-width: 155px; }

.bottom { border-top: 1px solid #1e1e1e; padding: 8px 10px; flex-shrink: 0; }
.analyze-row { display: flex; gap: 6px; }
.analyze-btn { flex: 1; background: #fff; border: none; border-radius: 7px; padding: 8px 12px; color: #111; font-size: 12px; font-weight: 600; cursor: pointer; transition: opacity 0.12s; font-family: inherit; }
.analyze-btn:hover { opacity: 0.85; }
.analyze-btn:disabled { background: #2a2a2a; color: #555; opacity: 1; cursor: not-allowed; }
.input-row { display: flex; gap: 6px; align-items: flex-end; }
.text-input { flex: 1; background: #181818; border: 1px solid #222; border-radius: 7px; padding: 8px 10px; color: #e0e0e0; font-size: 12px; font-family: inherit; resize: none; outline: none; line-height: 1.4; min-height: 34px; max-height: 80px; transition: border-color 0.12s; }
.text-input:focus { border-color: #333; }
.text-input::placeholder { color: #333; }
.send-btn { background: #fff; border: none; border-radius: 7px; width: 34px; height: 34px; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity 0.12s; }
.send-btn:hover { opacity: 0.8; }
.send-btn svg { width: 13px; height: 13px; }

#progressBubble { color: #888; }
.hidden { display: none !important; }
</style>
</head>
<body>

function loadRemoteAssets(){

function saveMemory(key,value){memory[key]=value;try{localStorage.setItem('figment_memory',JSON.stringify(memory));}catch(e){}if(!DEV_MODE)parent.postMessage({pluginMessage:{type:'save-memory',memory:memory}},'*');}

function getMemoryContext(){var keys=Object.keys(memory);return keys.length?'Context: '+keys.map(function(k){return k+'='+memory[k];}).join(', ')+'.':''}

function fmt(text){
  if(!text)return'';
  var s=text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  s=s.replace(/^### (.+)$/gm,'<h3>$1</h3>');
  s=s.replace(/\*\*([^*\n]+)\*\*/g,'<b>$1</b>');
  s=s.replace(/\*([^*\n]+)\*/g,'<i>$1</i>');
  s=s.replace(/`([^`\n]+)`/g,'<code>$1</code>');
  s=s.replace(/((?:^[-\u2022] .+\n?)+)/gm,function(m){return'<ul>'+m.trim().split('\n').map(function(l){return'<li>'+l.replace(/^[-\u2022] /,'')+'</li>';}).join('')+'</ul>';});
  s=s.replace(/\n\n+/g,'</p><p>').replace(/\n/g,'<br>');
  if(!/<(p|ul|h3)>/.test(s))s='<p>'+s+'</p>';
  return s;
}

  var av=document.createElement('div');av.className='msg-av '+role;av.textContent=role==='ai'?'F':'A';
  var b=document.createElement('div');b.className='bubble';
  b.innerHTML=role==='ai'?fmt(text):text;
  msg.appendChild(av);msg.appendChild(b);el('chat').appendChild(msg);scrollBottom();
  return b;
}

function addChoices(question,options,onSelect,withFramePicker){
  hideEmpty();
  var wrap=document.createElement('div');wrap.className='msg ai';
  var av=document.createElement('div');av.className='msg-av ai';av.textContent='F';
  var inner=document.createElement('div');inner.style.minWidth='0';
  if(question){var q=document.createElement('div');q.className='bubble';q.innerHTML=fmt(question);inner.appendChild(q);}
  var btns=document.createElement('div');btns.className='choice-btns';
  options.forEach(function(opt){

    btn.onclick=function(){addBubble('user',opt);inner.remove();pendingInputCallback=null;onSelect(opt);};
    btns.appendChild(btn);

  if(withFramePicker){

    useBtn.onclick=function(){

      pendingFrameCallback=function(name){addBubble('user','📎 '+name);inner.remove();pendingInputCallback=null;onSelect('frame:'+name);};
    };
    inner.appendChild(useBtn);
  }
  wrap.appendChild(av);wrap.appendChild(inner);el('chat').appendChild(wrap);scrollBottom();
}

function pluginPost(msg){
  if(!DEV_MODE){parent.postMessage({pluginMessage:msg},'*');return;}
  setTimeout(function(){
    if(msg.type==='analyze')fire({type:'frame-data',data:DEV_MOCK.frame});
    if(msg.type==='ai-rename-prepare')fire({type:'ai-rename-tree',tree:DEV_MOCK.renameTree});
    if(msg.type==='ai-rename-apply')fire({type:'action-done',text:'AI переименовал '+Object.keys(msg.map).length+' слоёв'});
    if(msg.type==='smart-autolayout-prepare')fire({type:'smart-autolayout-data',image:'mock',tree:DEV_MOCK.autolayoutTree,frameId:'dev:1',frameName:'Dashboard / Main'});
    if(msg.type==='smart-autolayout-apply')fire({type:'action-done',text:'Умный лейаут: 1 контейнер, 3 переименовано'});
    if(msg.type==='extract-components-prepare')fire({type:'extract-components-tree',tree:DEV_MOCK.extractTree,frameName:'Dashboard / Main'});
    if(msg.type==='extract-components-apply')fire({type:'action-done',text:'Извлечено '+msg.components.length+' компонентов со стейтами'});
    if(msg.type==='ai-normalize'){[0,30,60,90].forEach(function(s,i){setTimeout(function(){fire({type:'progress',text:'Шрифты: '+s+'/90'});},i*350);});setTimeout(function(){fire({type:'action-done',text:'AI нормализация: 31 текстов, 0 лейаутов'});},1500);}
    if(msg.type==='apply-autolayout')fire({type:'action-done',text:'Авто-лейаут применён к 9 фреймам'});
    if(msg.type==='use-selected-frame')fire({type:'selected-frame-for-action',node:{id:'dev:1',name:'Dashboard / Main'}});
  },60);
}
function fire(msg){window.dispatchEvent(new MessageEvent('message',{data:{pluginMessage:msg}}));}

function callClaude(messages,systemPrompt,model,maxTokens,mockOverride){
  if(DEV_MODE){var raw=mockOverride||DEV_MOCK.analysisRaw;return new Promise(function(resolve){setTimeout(function(){resolve(raw);},650);});}
  return new Promise(function(resolve,reject){
    fetch(PROXY_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:model||CFG.models.chat,max_tokens:maxTokens||1024,system:systemPrompt,messages:messages})})
    .then(function(resp){return resp.json().then(function(data){if(!resp.ok){reject(new Error('HTTP '+resp.status+': '+(data.error?data.error.message:JSON.stringify(data))));return;}if(!data.content||!data.content[0]){reject(new Error('Пустой ответ'));return;}resolve(data.content[0].text);});})
    .catch(function(e){reject(new Error('Сеть: '+e.message));});
  });
}

function callClaudeStream(messages,systemPrompt,model,onChunk){
  if(DEV_MODE){var reply=DEV_MOCK.chatReplies[Math.floor(Math.random()*DEV_MOCK.chatReplies.length)];return new Promise(function(resolve){var i=0,cur='';var iv=setInterval(function(){if(i<reply.length){cur+=reply[i++];onChunk(cur);}else{clearInterval(iv);resolve(cur);}},18);});}
  return new Promise(function(resolve,reject){
    fetch(PROXY_STREAM_URL,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:model||CFG.models.chat,max_tokens:1024,system:systemPrompt,messages:messages,stream:true})})
    .then(function(resp){
      if(!resp.ok){resp.json().then(function(d){reject(new Error('HTTP '+resp.status+': '+(d.error?d.error.message:'')));});return;}
      var reader=resp.body.getReader(),decoder=new TextDecoder(),fullText='';
      function read(){reader.read().then(function(result){if(result.done){resolve(fullText);return;}decoder.decode(result.value,{stream:true}).split('\n').forEach(function(line){if(!line.startsWith('data: '))return;var d=line.slice(6).trim();if(d==='[DONE]')return;try{var p=JSON.parse(d);if(p.type==='content_block_delta'&&p.delta&&p.delta.text){fullText+=p.delta.text;onChunk(fullText);}}catch(e){}});read();}).catch(reject);}
      read();
    }).catch(function(e){reject(new Error('Сеть: '+e.message));});
  });
}

function parseJSON(raw){var s=raw.indexOf('{'),e=raw.lastIndexOf('}');if(s===-1||e===-1)throw new Error('No JSON');return JSON.parse(raw.slice(s,e+1));}

function executeAction(actionId){
  if(actionId==='rename_layers'){addBubble('ai','Собираю дерево слоёв...');pluginPost({type:'ai-rename-prepare'});}
  else if(actionId==='extract_components'){addBubble('ai','Ищу UI компоненты...');pluginPost({type:'extract-components-prepare'});}
  else if(actionId==='smart_autolayout'){addBubble('ai','Делаю скриншот и анализирую структуру...');pluginPost({type:'smart-autolayout-prepare',scale:CFG.screenshot_scale,treeDepth:CFG.tree_depth,treeMaxChildren:CFG.tree_max_children});}
  else if(actionId==='apply_autolayout'){pluginPost({type:'apply-autolayout'});}
  else if(actionId==='ai_normalize'){addChoices('Какой шрифт использовать?',['Inter','Roboto','SF Pro','Оставить текущий'],function(val){addBubble('ai','Нормализую шрифты...');pluginPost({type:'ai-normalize',fontFamily:val==='Оставить текущий'?null:val});});}
  else{addBubble('ai','Действие **'+actionId+'** — следующая версия.');}
}

var _autolayoutProcessing=false;
function handleSmartAutolayoutData(data){
  if(_autolayoutProcessing)return;
  _autolayoutProcessing=true;addTyping();
  var sys=getPrompt('smart_autolayout')||'Analyze frame and return auto-layout plan as JSON.';
  var p=DEV_MODE?new Promise(function(resolve){setTimeout(function(){resolve(DEV_MOCK.autolayoutPlanRaw);},800);}):callClaude([{role:'user',content:[{type:'image',source:{type:'base64',media_type:'image/png',data:data.image}},{type:'text',text:'Frame: '+data.frameName+'\n\nLayer tree:\n'+JSON.stringify(data.tree,null,1)}]}],sys,CFG.models.autolayout,4096);
  p.then(function(raw){
    _autolayoutProcessing=false;removeTyping();
    var plan;try{plan=parseJSON(raw);}catch(e){addBubble('ai','Ошибка парсинга: '+raw.slice(0,150));return;}
    var total=countContainers(plan.containers||[]),skipped=(plan.skipped||[]).length;
    if(CFG.autolayout_preview){
      addBubble('ai','План готов: **'+total+' контейнеров**'+(skipped?', '+skipped+' пропущено':'')+'.\n\nПрименить?');
      addChoices(null,['✅ Применить','❌ Отмена'],function(val){if(val==='✅ Применить'){addBubble('ai','Применяю...');pluginPost({type:'smart-autolayout-apply',plan:plan});}else addBubble('ai','Отменено.');});
    }else{pluginPost({type:'smart-autolayout-apply',plan:plan});}
  }).catch(function(e){_autolayoutProcessing=false;removeTyping();addBubble('ai','Ошибка: '+e.message);});
}
function countContainers(c){var n=0;c.forEach(function(x){n++;if(x.children)n+=countContainers(x.children);});return n;}

function handleExtractComponentsTree(data){
  addTyping();
  var sys=getPrompt('extract_components')||'Find standard UI components. Return ONLY JSON.';
  var prompt='Find standard UI components.\n\nFrame: '+data.frameName+'\n\nTree:\n'+JSON.stringify(data.tree,null,1);
  var p=DEV_MODE?new Promise(function(resolve){setTimeout(function(){resolve(DEV_MOCK.extractResultRaw);},700);}):callClaude([{role:'user',content:prompt}],sys,CFG.models.analysis);
  p.then(function(raw){
    removeTyping();
    var result;try{result=parseJSON(raw);}catch(e){addBubble('ai','Ошибка парсинга: '+raw.slice(0,150));return;}
    if(!result.found||!result.found.length){addBubble('ai','Стандартных UI компонентов не найдено.');showAnalyzeRow();return;}
    addBubble('ai',result.summary+'\n\nВынести на отдельный фрейм?');
    addBubble('ai',result.found.map(function(c){return c.label+' ('+c.states.length+' стейтов)';}).join('\n'));
    addChoices(null,['✅ Вынести все','❌ Отмена'],function(val){if(val==='✅ Вынести все'){addBubble('ai','Создаю фрейм со стейтами...');pluginPost({type:'extract-components-apply',components:result.found});}else addBubble('ai','Отменено.');});
    showAnalyzeRow();
  }).catch(function(e){removeTyping();addBubble('ai','Ошибка: '+e.message);showAnalyzeRow();});
}

function startAnalysis(){el('analyzeBtn').disabled=true;setActiveAction('analyze');pluginPost({type:'analyze'});}

function runAnalysis(data){
  frameData=data;state='analyzing';
  addBubble('user','Анализирую '+data.name);addTyping();
  var sys=getPrompt('analyze_frame')||'Analyze Figma frame. Return ONLY raw JSON: {"analysis":"2-3 sentences RU","actions":[{"icon":"emoji","label":"3 words RU","id":"action_id"}]}. Pick 4 from: rename_layers,audit_colors,annotate,smart_autolayout,ai_normalize,extract_components.';
  var memCtx=getMemoryContext();if(memCtx)sys+='\n'+memCtx;
  var isComp=data.type==='COMPONENT'||data.type==='COMPONENT_SET'||data.type==='INSTANCE';
  conversationHistory=[{role:'user',content:(isComp?'Component: ':'Screen: ')+JSON.stringify(data,null,1)}];
  callClaude(conversationHistory,sys,CFG.models.analysis,1024,DEV_MODE?DEV_MOCK.analysisRaw:null).then(function(raw){
    conversationHistory.push({role:'assistant',content:raw});removeTyping();setActiveAction(null);
    var parsed;try{parsed=parseJSON(raw);}catch(e){addBubble('ai','Сырой ответ:\n'+raw.slice(0,400));showAnalyzeRow();el('analyzeBtn').disabled=false;return;}
    addBubble('ai',parsed.analysis||'');
    var card=document.createElement('div');card.className='audit-card';
    card.innerHTML='<div class="audit-title">Quick audit</div><div class="metrics"><div class="metric warn"><div class="metric-val">14</div><div class="metric-lbl">hardcoded colors</div></div><div class="metric warn"><div class="metric-val">3</div><div class="metric-lbl">font families</div></div><div class="metric ok"><div class="metric-val">6</div><div class="metric-lbl">components</div></div><div class="metric"><div class="metric-val">47</div><div class="metric-lbl">layers</div></div></div><div class="tags"><span class="tag">1440×900</span><span class="tag">0 auto-layout</span><span class="tag">DS: partial</span></div><div class="progress-bar"><div class="progress-fill" id="pfill" style="width:0%"></div></div>';
    var lb=el('chat').lastElementChild.querySelector('.bubble');if(lb)lb.appendChild(card);
    setTimeout(function(){var pf=el('pfill');if(pf)pf.style.width='32%';},100);
    el('auditBadge').classList.remove('hidden');
    if(parsed.actions&&parsed.actions.length){
      hideEmpty();
      var wrap=document.createElement('div');wrap.className='msg ai';
      var av=document.createElement('div');av.className='msg-av ai';av.textContent='F';
      var inner=document.createElement('div');
      var lbl=document.createElement('div');lbl.className='bubble';lbl.innerHTML=fmt('Рекомендую:');inner.appendChild(lbl);
      var btns=document.createElement('div');btns.className='choice-btns';
      parsed.actions.slice(0,4).forEach(function(a){var btn=document.createElement('button');btn.className='choice-btn';btn.textContent=a.icon+' '+a.label;btn.onclick=function(){triggerAction(a.id);};btns.appendChild(btn);});
      inner.appendChild(btns);wrap.appendChild(av);wrap.appendChild(inner);el('chat').appendChild(wrap);scrollBottom();
    }
    saveMemory('last_screen',data.name);state='actions';showInputRow();el('analyzeBtn').disabled=false;
  }).catch(function(e){removeTyping();setActiveAction(null);addBubble('ai','Ошибка: '+e.message);showAnalyzeRow();el('analyzeBtn').disabled=false;});
}

function triggerAction(actionId){
  setActiveAction(actionId.split('_')[0]);currentAction={id:actionId};
  var flowChoices={
    rename_layers:{q:'Соглашение:',opts:['BEM','camelCase','AI выберет'],exec:function(val){saveMemory('naming',val);executeAction('rename_layers');}},
    smart_autolayout:{q:null,opts:['🚀 Запустить анализ'],exec:function(){executeAction('smart_autolayout');}},
    audit_colors:{q:'Есть библиотека переменных?',opts:['Да','Нет'],exec:function(val){executeAction('audit_colors');}},
    annotate:{q:'Для кого?',opts:['Разработчики','PM','Стейкхолдеры'],exec:function(val){saveMemory('annotation_for',val);executeAction('annotate');}},
    extract_components:{q:null,opts:['🔍 Найти компоненты'],exec:function(){executeAction('extract_components');}},
    ai_normalize:{q:'Шрифт:',opts:['Inter','Roboto','SF Pro','Оставить текущий'],exec:function(val){var f=val==='Оставить текущий'?null:val;if(f)saveMemory('font',f);addBubble('ai','Нормализую...');pluginPost({type:'ai-normalize',fontFamily:f});}}
  };
  var flow=flowChoices[actionId];
  if(flow){addBubble('user',actionId.replace(/_/g,' '));addChoices(flow.q,flow.opts,function(val){flow.exec(val);showAnalyzeRow();},false);showInputRow();return;}
  addBubble('user',actionId.replace(/_/g,' '));
  var bubble=addStreamBubble();
  conversationHistory.push({role:'user',content:'Хочу: '+actionId});
  callClaudeStream(conversationHistory,'Ты AI-ассистент дизайнера Figma. Только UI/UX. Кратко, на русском.',CFG.models.chat,function(t){bubble.innerHTML=fmt(t);scrollBottom();})
  .then(function(full){bubble.classList.remove('streaming');conversationHistory.push({role:'assistant',content:full});showInputRow();})
  .catch(function(e){bubble.classList.remove('streaming');bubble.innerHTML=fmt('Ошибка: '+e.message);});
}

function sendUserMessage(){
  var input=el('userInput');var text=input.value.trim();if(!text)return;
  input.value='';input.style.height='auto';
  if(pendingInputCallback){pendingInputCallback(text);return;}
  addBubble('user',text);conversationHistory.push({role:'user',content:text});
  var sys='Ты AI-ассистент дизайнера Figma. Только UI/UX. На офтоп: "Это не про дизайн." Кратко, на русском.';
  var memCtx=getMemoryContext();if(memCtx)sys+=' '+memCtx;
  var bubble=addStreamBubble();
  callClaudeStream(conversationHistory,sys,CFG.models.chat,function(t){bubble.innerHTML=fmt(t);scrollBottom();})
  .then(function(full){bubble.classList.remove('streaming');conversationHistory.push({role:'assistant',content:full});if(full.toLowerCase().indexOf('выполняю')!==-1&&currentAction)executeAction(currentAction.id);})
  .catch(function(e){bubble.classList.remove('streaming');bubble.innerHTML=fmt('Ошибка: '+e.message);});
}

function handleKey(e){
  if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendUserMessage();}
  var t=e.target;t.style.height='auto';t.style.height=Math.min(t.scrollHeight,80)+'px';
}

window.onmessage=function(event){
  var msg=event.data.pluginMessage;if(!msg)return;
  if(msg.type==='selection'){
    if(msg.node){el('frameName').textContent=msg.node.name;el('frameSub').textContent=msg.node.type.toLowerCase();el('frameCard').classList.remove('empty');el('thumbMock').style.display='block';el('thumbEmpty').style.display='none';updateStatus(msg.node.name);}
    else{el('frameName').textContent='Ничего не выбрано';el('frameSub').textContent='выдели фрейм';el('frameCard').classList.add('empty');el('thumbMock').style.display='none';el('thumbEmpty').style.display='flex';updateStatus(null);}
  }
  if(msg.type==='frame-data'){runAnalysis(msg.data);}
  if(msg.type==='ai-rename-tree'){handleAiRenameTree(msg.tree);}
  if(msg.type==='extract-components-tree'){handleExtractComponentsTree(msg);}
  if(msg.type==='smart-autolayout-data'){handleSmartAutolayoutData(msg);}
  if(msg.type==='memory-loaded'){if(msg.memory&&Object.keys(msg.memory).length){memory=msg.memory;el('memDot').style.display='block';}}
  if(msg.type==='selected-frame-for-action'){if(pendingFrameCallback){pendingFrameCallback(msg.node.name);pendingFrameCallback=null;}}
  if(msg.type==='progress'){
    var pb=el('progressBubble');
    if(!pb){hideEmpty();var wrap=document.createElement('div');wrap.className='msg ai';var av=document.createElement('div');av.className='msg-av ai';av.textContent='F';pb=document.createElement('div');pb.className='bubble';pb.id='progressBubble';wrap.appendChild(av);wrap.appendChild(pb);el('chat').appendChild(wrap);}
    pb.textContent='⚙️ '+msg.text;scrollBottom();
  }
  if(msg.type==='action-done'){var pb=el('progressBubble');if(pb)pb.parentNode.remove();addBubble('ai','✅ '+msg.text);setActiveAction(null);showAnalyzeRow();}
  if(msg.type==='action-error'){addBubble('ai','⚠️ '+msg.text);setActiveAction(null);showAnalyzeRow();}
  if(msg.type==='error'){removeTyping();addBubble('ai','⚠️ '+msg.text);el('analyzeBtn').disabled=false;showAnalyzeRow();}
};

var _collapsed=false;
function toggleCollapse(){
  _collapsed=!_collapsed;
  document.body.classList.toggle('collapsed',_collapsed);
  el('collapseBtn').textContent=_collapsed?'∨':'∧';
  el('collapseBtn').title=_collapsed?'Развернуть':'Свернуть';
  parent.postMessage({pluginMessage:{type:'resize',width:560,height:_collapsed?36:680}},'*');
}
function updateStatus(frameName){
  el('statusFrame').textContent=frameName||'Ничего не выбрано';
  el('statusHint').textContent=_collapsed?'свёрнут':'';
}

loadRemoteAssets();
loadMemory();
if(DEV_MODE)setDevMode(true);
</script>
